<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | jymer1102</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <nav>
        <a href="./index.html" class="logo">jymer1102</a>
        <div class="nav-links">
            <a href="./index.html">Home</a>
            <a href="./creations.html">Creations</a>
            <a href="./connect.html" class="active">Connect</a>
        </div>
    </nav>

    <main class="container">
        
        <header class="page-header">
            <div class="eyebrow">GET_IN_TOUCH</div>
            <h1 class="glow-text">Connect<span class="cursor">&nbsp;</span></h1>
            <p class="subtitle">Reach out via socials or send a direct message.</p>
        </header>

        <section class="connect-section">
            <div class="connect-panel">
                <ul class="connect-list">
                    <li>
                        <span class="connect-label">Email</span>
                        <a href="mailto:contact@jymer1102.me" class="connect-value">contact@jymer1102.me</a>
                    </li>
                    <li>
                        <span class="connect-label">Phone</span>
                        <a href="tel:+1234567890" class="connect-value">+1 (234) 567-890</a>
                    </li>
                    <li>
                        <span class="connect-label">Linktree</span>
                        <a href="https://linktr.ee/jymer1102" target="_blank" rel="noopener noreferrer" class="connect-value">linktr.ee/jymer1102</a>
                    </li>
                </ul>
            </div>
        </section>

        <section class="contact-section">
            <div class="form-container">
                <form action="https://formspree.io/f/xlgqnkqn" method="POST">
                    
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="_replyto" class="form-control" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject" class="form-control">
                            <option value="General Inquiry">General Inquiry</option>
                            <option value="Project Proposal">Project Proposal</option>
                            <option value="Collaboration">Collaboration</option>
                            <option value="Just Saying Hi">Just Saying Hi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" class="form-control" placeholder="Write your message here..." required></textarea>
                    </div>

                    <input type="hidden" name="_subject" value="New message from jymer1102.me!">

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>

    </main>

    <footer>
        <p>jymer1102 &bull; built with care</p>
    </footer>

</body>
</html>
