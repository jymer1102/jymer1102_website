<header class="page-header" data-aos="fade-up" data-aos-duration="900">
    <p class="eyebrow">portfolio / connect</p>
    <h1 class="glow-text">Connect<span class="cursor">_</span></h1>
    <p class="subtitle">Reach out via socials or send a direct message.</p>
</header>

<main class="container">
    
    <section class="connect-section" data-aos="fade-up" data-aos-duration="900">
        <div class="connect-panel js-interactive-container">
            <ul class="connect-list">
                <li>
                    <span class="connect-label"><i class="fa-solid fa-at"></i> Email</span>
                    <a href="mailto:theoneandonly@jymer1102.me" class="connect-value">theoneandonly@jymer1102.me</a>
                </li>
                <li>
                    <span class="connect-label"><i class="fa-solid fa-phone"></i> Phone</span>
                    <a href="#" id="phone-link" class="connect-value">+1 (234) 567-890</a>
                </li>
                <li>
                    <span class="connect-label"><i class="fa-brands fa-linktree"></i> Linktree</span>
                    <a href="https://linktr.ee/jymer1102" target="_blank" rel="noopener noreferrer" class="connect-value">linktr.ee/jymer1102</a>
                </li>
            </ul>
        </div>

        <p id="scroll-indicator">Scroll down to send a message ↓</p>
    </section>

    <section class="contact-section" data-aos="fade-up" data-aos-duration="900" data-aos-delay="100">
        <div class="form-container js-interactive-container">
            <form action="https://formspree.io/f/xlgqnkqn" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <div class="glow-input-wrapper">
                        <input type="text" id="name" name="name" class="glow-input-hidden" placeholder="Your Name" required>
                        <div class="glow-input-display">
                            <span class="display-text"></span>
                            <span class="custom-caret" style="display: none;"></span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="glow-input-wrapper">
                        <input type="email" id="email" name="_replyto" class="glow-input-hidden" placeholder="name@example.com" required>
                        <div class="glow-input-display">
                            <span class="display-text"></span>
                            <span class="custom-caret" style="display: none;"></span>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" class="form-control">
                        <option value="General Inquiry">General Inquiry</option>
                        <option value="Project Proposal">Project Proposal</option>
                        <option value="Collaboration">Collaboration</option>
                        <option value="Just Saying Hi">Just Saying Hi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" class="form-control" placeholder="Write your message here..." required></textarea>
                </div>

                <input type="hidden" name="_subject" value="New message from jymer1102.me!">

                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </section>

</main>
